<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 VIP HACK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        gold: '#FFD700', 
                        darkbg: '#050400', /* Qora-oltin fon uchun zamin */
                        danger: '#ff3131',
                        panel: '#0a0a0a'
                    },
                    fontFamily: { mono: ['"Courier New"', 'Courier', 'monospace'] },
                    boxShadow: { 
                        'gold-glow': '0 0 15px rgba(255, 215, 0, 0.4)', 
                        'danger-glow': '0 0 15px rgba(255, 0, 60, 0.4)',
                        'inner-gold': 'inset 0 0 15px rgba(255, 215, 0, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            /* Qora va to'q oltin rangli zamonaviy gradient fon */
            background: radial-gradient(circle at center, #1f1700 0%, #000000 100%); 
            color: theme('colors.gold'); 
            font-family: theme('fontFamily.mono'); overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            min-height: 100vh;
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.5; }
        
        /* Glassmorphism VIP Cards */
        .glass-card { 
            background: linear-gradient(145deg, rgba(20,15,0,0.95) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.3); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        .glass-card:active { 
            transform: scale(0.95); border-color: theme('colors.gold'); 
            box-shadow: theme('boxShadow.gold-glow'); 
        }
        
        /* Custom Scrollbar */
        .scrollable-y { overflow-y: auto; scrollbar-width: none; }
        .scrollable-y::-webkit-scrollbar { display: none; }

        /* MUKAMMAL KATAKLAR (GAME CELLS) - Ajralib turadigan qilindi */
        .game-cell { 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(30, 20, 0, 0.7); /* To'q qora-tillarang fon */
            border: 2px solid rgba(255, 215, 0, 0.3); /* Ajralib turadigan qalinroq rom */
            border-radius: 10px; font-size: 1.5rem; transition: 0.4s ease; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); /* Ichki soya hajmi */
        }
        
        /* YONIB TURGAN (FAOL) KATAKLAR */
        .game-cell.active-signal { 
            background: rgba(255, 215, 0, 0.25); border-color: theme('colors.gold'); 
            box-shadow: 0 0 15px rgba(255,215,0,0.5), inset 0 0 15px rgba(255, 215, 0, 0.4); 
            font-size: 2.2rem; 
            text-shadow: 0 0 15px #FFD700; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            z-index: 10;
        }
        
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* Glitch & Scanner Effects */
        .glitch { text-shadow: 2px 2px 0px rgba(255, 215, 0, 0.5), -2px -2px 0px rgba(255, 255, 255, 0.3); animation: glitch-anim 1.5s infinite alternate-reverse; }
        @keyframes glitch-anim { 0% { text-shadow: 2px 2px 0 rgba(255,215,0,0.5), -2px -2px 0 rgba(255,255,255,0.3); } 100% { text-shadow: -2px -2px 0 rgba(255,215,0,0.5), 2px 2px 0 rgba(255,255,255,0.3); } }

        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: theme('colors.gold'); box-shadow: 0 0 15px theme('colors.gold'); animation: scan 1.5s ease-in-out infinite; opacity: 0.8; pointer-events: none; display: none; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex flex-col items-center h-screen w-full relative">

    <canvas id="matrix-canvas"></canvas>

    <div id="boot-screen" class="absolute inset-0 z-50 bg-[#020202] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-bold mb-2 tracking-[8px] glitch text-gold">RICHI28 VIP</h1>
        <p class="text-[12px] mb-8 opacity-50 text-white">SECURE CONNECTION ESTABLISHING...</p>
        <div class="w-full max-w-[280px] h-[6px] bg-gray-900 border border-gold/50 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-gold w-0 shadow-gold-glow transition-all duration-100 rounded-full"></div>
        </div>
        <p id="boot-text" class="mt-5 text-[10px] animate-pulse uppercase tracking-[3px] text-gold/80">Connecting to server...</p>
    </div>

    <div id="lobby" class="hidden w-full h-full flex-col px-4 pt-4 pb-8 scrollable-y relative z-10 max-w-2xl mx-auto">
        <div class="flex justify-between items-center border-b border-gold/30 pb-4 mb-5 sticky top-0 bg-transparent backdrop-blur-md z-20">
            <div class="text-[10px] font-bold tracking-widest text-white">
                <span class="opacity-40">USER:</span> <span class="text-gold">VIP_ROOT</span><br>
                <span class="opacity-40">STATUS:</span> <span class="text-green-500 animate-pulse">CONNECTED</span>
            </div>
            <select id="lang-selector" onchange="switchLanguage()" class="bg-[#111] border border-gold/50 text-gold text-[10px] py-1 px-3 rounded outline-none cursor-pointer focus:border-gold transition">
                <option value="uz">UZB</option>
                <option value="ru">RUS</option>
                <option value="en">ENG</option>
            </select>
        </div>

        <div class="border border-danger/50 bg-[#1a0505] p-4 rounded-xl mb-6 shadow-danger-glow relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-danger"></div>
            <p id="warning-text-lobby" class="text-[10px] text-white/90 leading-relaxed font-bold text-center uppercase tracking-wider"></p>
        </div>

        <div class="grid grid-cols-2 gap-4" id="games-container"></div>

        <div class="mt-8 mb-4 text-center">
            <button onclick="sendSupport()" class="text-[10px] text-gold/60 hover:text-gold transition border border-gold/20 px-6 py-3 rounded-lg bg-black/80 tracking-widest uppercase" id="support-text"></button>
        </div>
    </div>

    <div id="game-view" class="hidden w-full h-full flex-col p-4 relative z-10 max-w-2xl mx-auto">
        
        <div class="flex justify-between items-center mb-4 bg-panel/80 p-3 rounded-xl border border-gold/30 backdrop-blur-md">
            <button onclick="goBack()" class="text-gold border border-gold/40 px-4 py-1.5 text-[10px] hover:bg-gold hover:text-black rounded-md transition font-bold tracking-wider" id="btn-back">⬅️</button>
            <h2 id="active-game-title" class="text-sm font-bold tracking-[5px] uppercase text-white shadow-gold-glow"></h2>
            <div class="w-12"></div>
        </div>

        <div class="border border-danger/40 bg-black/80 p-3 rounded-lg mb-4 shadow-[0_0_15px_rgba(255,0,60,0.15)] flex items-center gap-3">
            <span class="text-danger text-2xl animate-pulse">⚠️</span>
            <p id="warning-text-game" class="text-[8px] text-white/80 leading-relaxed font-bold text-left uppercase tracking-wide"></p>
        </div>

        <div class="w-full text-center h-4 mb-2">
            <p id="hack-log" class="text-[10px] text-gold italic uppercase tracking-widest"></p>
        </div>

        <div id="signal-container" class="w-full flex-1 bg-black/40 border border-gold/40 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden mb-6 p-4 shadow-[0_0_20px_rgba(255,215,0,0.15)] backdrop-blur-sm">
            <div class="scan-line" id="scanline"></div>
            
            <div id="signal-render-area" class="w-full h-full flex flex-col items-center text-center overflow-y-auto scrollable-y py-4 px-2">
            </div>
        </div>

        <button id="btn-hack" onclick="executeHack()" class="w-full bg-gradient-to-r from-[#FFD700] to-[#B8860B] text-black font-extrabold text-lg py-5 rounded-xl shadow-[0_0_20px_rgba(255,215,0,0.4)] uppercase tracking-[4px] active:scale-[0.97] transition-all disabled:opacity-40 disabled:cursor-not-allowed mb-2">
            ⚡️ SIGNAL OLISH
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let currentLang = 'uz';
        let activeGame = null;
        let crashCooldownTime = 0;
        let ladderCurrentStep = 0; 

        const translations = {
            uz: {
                warning: "DIQQAT: Agar RICHI28 promokodidan o‘tmagan bo‘lsangiz yoki hisobingizda minimal 60,000 UZS bo‘lmasa, tizim bloklashi mumkin!",
                support: "TAKLIF VA MUROJAAT YUBORISH",
                back: "ORTGA",
                get_signal: "⚡️ SIGNAL OLISH",
                next_step: "⬆️ KEYINGI QADAM",
                restart: "🔄 QAYTA BOSHLASH",
                analyzing: "TAHLIL QILINMOQDA...",
                crash_wait: "KUTING! KEYINGI SIGNALGACHA:",
            },
            ru: {
                warning: "ВНИМАНИЕ: Без промокода RICHI28 или депозита минимум 500 RUB система может выдать неверный сигнал!",
                support: "ОТПРАВИТЬ ПРЕДЛОЖЕНИЕ",
                back: "НАЗАД",
                get_signal: "⚡️ ПОЛУЧИТЬ СИГНАЛ",
                next_step: "⬆️ СЛЕДУЮЩИЙ ШАГ",
                restart: "🔄 НАЧАТЬ ЗАНОВО",
                analyzing: "АНАЛИЗ...",
                crash_wait: "ОЖИДАЙТЕ! ДО СЛЕДУЮЩЕГО СИГНАЛА:",
            },
            en: {
                warning: "ATTENTION: Without RICHI28 promo code or minimum 5 USD deposit, the system may block your account!",
                support: "SEND FEEDBACK",
                back: "BACK",
                get_signal: "⚡️ GET SIGNAL",
                next_step: "⬆️ NEXT STEP",
                restart: "🔄 RESTART",
                analyzing: "ANALYZING...",
                crash_wait: "WAIT! NEXT SIGNAL IN:",
            }
        };

        const gamesList = [
            { id: 'apple', name: 'Apple of Fortune', icon: '🍎', kf: 'x1.23 - x349', type: 'ladder', grid: {cols: 5, rows: 10} },
            { id: 'crash', name: 'Crash', icon: '🚀', kf: 'x1.00 - x100+', type: 'multiplier' },
            { id: 'kamikaze', name: 'Kamikaze', icon: '✈️', kf: 'x1.21 - x15.4', type: 'ladder', grid: {cols: 5, rows: 10} },
            { id: 'nights', name: 'Eastern Nights', icon: '🪔', kf: 'x1.18 - x349', type: 'ladder', grid: {cols: 5, rows: 10} },
            { id: 'wild', name: 'Wild West Gold', icon: '💰', kf: 'x2.00 - x3.00', type: 'ladder', grid: {cols: 3, rows: 10} },
            { id: 'dragon', name: 'Dragon\'s Gold', icon: '🪙', kf: 'x1.23 - x349', type: 'ladder', grid: {cols: 5, rows: 10} },
            { id: 'swamp', name: 'Swamp Land', icon: '🐸', kf: 'x1.20 - x14.5', type: 'ladder', grid: {cols: 5, rows: 5} },
            { id: 'mines', name: 'Gems & Mines', icon: '💣', kf: 'x1.05 - x100+', type: 'mines' },
            { id: 'dice', name: 'Under/Over 7', icon: '🎲', kf: 'x2.3 - x5.8', type: 'dice' },
            { id: 'thimbles', name: 'Thimbles', icon: '🥤', kf: 'x1.45 - x2.91', type: 'thimbles' }
        ];

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({length: Math.floor(columns)}).fill(1);

        function drawMatrix() {
            /* Matritsa oq-qora fonga mos tushishi uchun to'q qora-tillarang aralashma */
            ctx.fillStyle = "rgba(5, 4, 0, 0.2)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                if (Math.random() > 0.95) {
                    ctx.fillStyle = "#FFFFFF"; 
                } else {
                    ctx.fillStyle = "#FFD700"; 
                }
                
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.onload = () => {
            let progress = 0;
            const bar = document.getElementById('boot-bar');
            const txt = document.getElementById('boot-text');
            const bootTimer = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 2;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(bootTimer);
                    setTimeout(() => {
                        document.getElementById('boot-screen').style.display = 'none';
                        document.getElementById('lobby').style.display = 'flex';
                        tg.HapticFeedback.notificationOccurred('success');
                    }, 500);
                }
                bar.style.width = progress + '%';
                txt.innerText = `[ LOADING CORE: ${progress}% ]`;
            }, 100);

            renderLobby();
            applyLanguage();
        };

        function renderLobby() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            gamesList.forEach(g => {
                container.innerHTML += `
                    <div class="glass-card flex flex-col items-center justify-center p-6 rounded-2xl cursor-pointer" onclick="openGame('${g.id}')">
                        <span class="text-[40px] mb-3 filter drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">${g.icon}</span>
                        <h3 class="text-[11px] font-bold text-white uppercase tracking-wider mb-2 text-center h-8 flex items-center">${g.name}</h3>
                        <span class="text-[9px] text-gold bg-gold/10 px-3 py-1 rounded border border-gold/20 font-bold">${g.kf}</span>
                    </div>
                `;
            });
        }

        function switchLanguage() {
            currentLang = document.getElementById('lang-selector').value;
            applyLanguage();
            tg.HapticFeedback.selectionChanged();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('warning-text-lobby').innerText = t.warning;
            document.getElementById('warning-text-game').innerText = t.warning;
            document.getElementById('support-text').innerText = t.support;
            document.getElementById('btn-back').innerText = `⬅️ ${t.back}`;
            
            const btn = document.getElementById('btn-hack');
            if(activeGame && activeGame.type === 'ladder') {
                if (ladderCurrentStep === 0) btn.innerText = t.get_signal;
                else if (ladderCurrentStep >= activeGame.grid.rows) btn.innerText = t.restart;
                else btn.innerText = t.next_step;
            } else {
                btn.innerText = t.get_signal;
            }
        }

        function openGame(id) {
            activeGame = gamesList.find(g => g.id === id);
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            document.getElementById('active-game-title').innerText = activeGame.name;
            document.getElementById('hack-log').innerText = '';
            
            ladderCurrentStep = 0; 
            applyLanguage(); 

            if(activeGame.type === 'ladder') {
                renderEmptyGrid();
            } else {
                document.getElementById('signal-render-area').innerHTML = `<span class="text-[12px] opacity-30 tracking-widest text-white mt-auto mb-auto">[ SYSTEM READY ]</span>`;
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        function goBack() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';
            activeGame = null;
            tg.HapticFeedback.impactOccurred('light');
        }

        function renderEmptyGrid() {
            const area = document.getElementById('signal-render-area');
            const cols = activeGame.grid.cols;
            const rows = activeGame.grid.rows;
            
            // max-w kengaytirildi va gap oshirildi, kataklar aniq turishi uchun
            let html = `<div class="flex flex-col-reverse gap-3 w-full max-w-[300px] mx-auto mt-auto mb-auto" id="ladder-grid">`;
            for(let r = 0; r < rows; r++) {
                html += `<div class="grid gap-3 w-full px-2" id="row-${r}" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr));">`;
                for(let c = 0; c < cols; c++) {
                    // opacity-20 butunlay OLIb TASHLANDI. Endi kataklar tiniq ko'rinadi.
                    html += `<div class="game-cell h-[48px] w-full" id="cell-${r}-${c}"></div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function executeHack() {
            const btn = document.getElementById('btn-hack');
            const log = document.getElementById('hack-log');
            const scanline = document.getElementById('scanline');
            const area = document.getElementById('signal-render-area');
            const t = translations[currentLang];

            if(activeGame.type === 'ladder') {
                if(ladderCurrentStep >= activeGame.grid.rows) {
                    ladderCurrentStep = 0;
                    renderEmptyGrid();
                    btn.innerText = t.get_signal;
                    log.innerText = 'GRID RESET SUCCESSFUL';
                    tg.HapticFeedback.impactOccurred('medium');
                    return;
                }

                btn.disabled = true;
                btn.innerText = t.analyzing;
                scanline.style.display = 'block';
                log.innerText = "BYPASSING ALGORITHM...";
                tg.HapticFeedback.impactOccurred('light');

                setTimeout(() => {
                    const cols = activeGame.grid.cols;
                    const safeCol = Math.floor(Math.random() * cols);
                    
                    for(let i=0; i<ladderCurrentStep; i++) {
                        const oldRow = document.getElementById(`row-${i}`);
                        if(oldRow) oldRow.style.opacity = '0.7';
                    }

                    const targetCell = document.getElementById(`cell-${ladderCurrentStep}-${safeCol}`);
                    const targetRow = document.getElementById(`row-${ladderCurrentStep}`);
                    
                    if(targetCell) {
                        targetCell.className = "game-cell active-signal h-[48px] w-full";
                        targetCell.innerHTML = activeGame.icon;
                    }
                    
                    if(targetRow) {
                        targetRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    
                    ladderCurrentStep++;
                    
                    scanline.style.display = 'none';
                    log.innerText = `STEP ${ladderCurrentStep} SECURED`;
                    btn.disabled = false;
                    
                    if(ladderCurrentStep >= activeGame.grid.rows) {
                        btn.innerText = t.restart; 
                    } else {
                        btn.innerText = t.next_step; 
                    }
                    tg.HapticFeedback.notificationOccurred('success');
                }, 800);
                return;
            }

            if(activeGame.id === 'crash') {
                const now = Date.now();
                if(now - crashCooldownTime < 30000) {
                    const timeLeft = Math.ceil((30000 - (now - crashCooldownTime)) / 1000);
                    alert(`${t.crash_wait} ${timeLeft}s`);
                    return;
                }
                crashCooldownTime = now;
            }

            btn.disabled = true;
            btn.innerText = t.analyzing;
            scanline.style.display = 'block';
            log.innerText = "EXTRACTING DATA...";
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                scanline.style.display = 'none';
                log.innerText = "SIGNAL INJECTED";
                renderOtherSignals();
                btn.disabled = false;
                btn.innerText = t.get_signal;
                tg.HapticFeedback.notificationOccurred('success');
            }, 1200);
        }

        function renderOtherSignals() {
            const area = document.getElementById('signal-render-area');
            let html = '';

            if(activeGame.type === 'multiplier') {
                const val = (Math.random() * 4 + 1.10).toFixed(2);
                html = `
                    <div class="flex flex-col items-center animate-pulse mt-auto mb-auto">
                        <span class="text-[90px] font-bold text-white drop-shadow-[0_0_25px_#FFD700]">x${val}</span>
                        <span class="text-3xl mt-4 text-black font-black tracking-widest border-2 border-danger px-8 py-2 rounded-xl bg-danger shadow-danger-glow">STOP</span>
                    </div>
                `;
            } 
            else if(activeGame.type === 'mines') {
                html = `<div class="grid grid-cols-5 gap-3 w-full max-w-[300px] mx-auto mt-auto mb-auto px-2">`;
                const safeCount = Math.floor(Math.random() * 5) + 5; 
                let safes = [];
                while(safes.length < safeCount) {
                    let r = Math.floor(Math.random() * 25);
                    if(!safes.includes(r)) safes.push(r);
                }
                for(let i=0; i<25; i++) {
                    if(safes.includes(i)) {
                        html += `<div class="game-cell h-[48px] active-signal !text-3xl">💎</div>`;
                    } else {
                        html += `<div class="game-cell h-[48px]"></div>`;
                    }
                }
                html += `</div>`;
            }
            else if(activeGame.type === 'thimbles') {
                const ballCount = Math.random() > 0.5 ? 1 : 2; 
                let ballPositions = [];
                while(ballPositions.length < ballCount) {
                    let r = Math.floor(Math.random() * 3);
                    if(!ballPositions.includes(r)) ballPositions.push(r);
                }

                html = `<div class="flex flex-col items-center mt-auto mb-auto"><div class="flex gap-6 mb-8">`;
                for(let i=0; i<3; i++) {
                    if(ballPositions.includes(i)) {
                        html += `<div class="game-cell w-20 h-24 active-signal !text-5xl">⚪️</div>`;
                    } else {
                        html += `<div class="game-cell w-20 h-24 !text-5xl opacity-40">🥤</div>`;
                    }
                }
                html += `</div><span class="text-[12px] text-gold font-bold uppercase border border-gold/50 px-4 py-2 rounded-lg bg-gold/10">Game Mode: ${ballCount} Ball(s)</span></div>`;
            }
            else if(activeGame.type === 'dice') {
                const res = ["UNDER 7", "EXACT 7", "OVER 7"][Math.floor(Math.random() * 3)];
                html = `
                    <div class="flex flex-col items-center mt-auto mb-auto">
                        <span class="text-[80px] mb-6 animate-bounce filter drop-shadow-[0_0_15px_#fff]">🎲</span>
                        <div class="bg-gradient-to-r from-gold to-yellow-600 text-black font-black text-3xl px-8 py-3 rounded-xl shadow-gold-glow">${res}</div>
                    </div>
                `;
            }
            
            area.innerHTML = html;
        }

        function sendSupport() {
            const promptText = currentLang === 'uz' ? "Murojaat yoki taklifingizni yozing:" : 
                               (currentLang === 'ru' ? "Оставьте ваше обращение:" : "Leave your message/feedback:");
            const msg = prompt(promptText);
            if(msg && msg.trim() !== '') {
                tg.sendData(JSON.stringify({ type: 'support', text: msg }));
                alert(currentLang === 'uz' ? "Yuborildi!" : (currentLang === 'ru' ? "Отправлено!" : "Sent!"));
            }
        }
    </script>
</body>
</html>
