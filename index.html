<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 APPLE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --neon: #00FFAA; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .active { display: flex; }
        h1 { color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .main-btn { background: linear-gradient(45deg, var(--gold), #b8860b); border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .main-btn:disabled { opacity: 0.3; }
        #signal-container { flex-grow: 1; width: 100%; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 80px; overflow-y: hidden; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 5px 0; transition: 0.3s; opacity: 0.2; transform: scale(0.9); }
        .row.active-row { opacity: 1; transform: scale(1.1); }
        .cell { width: 45px; height: 45px; background: #111; border: 1px solid #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .cell.win { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); background: rgba(0,255,170,0.1); }
    </style>
</head>
<body>
    <div id="scr-1" class="screen active">
        <h1>RICHI28 APPLE 🍎</h1>
        <div style="background:#111; padding:20px; border-radius:15px; font-size:0.8rem; margin:10px;">
            <p>1. WINWIN ilovasida ro'yxatdan o'ting</p>
            <p>2. Promo kod: <b>RICHI28</b></p>
            <p>3. Depozit: min. 95,000 UZS</p>
        </div>
        <label><input type="checkbox" id="check"> Shartlarga roziman</label>
        <button id="start" class="main-btn" disabled>🚀 SIGNALNI BOSHLASH</button>
    </div>

    <div id="scr-2" class="screen">
        <div id="signal-container"></div>
        <button id="next" class="main-btn" style="position:fixed; bottom:20px;">👉 KEYINGISI</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const start = document.getElementById('start');
        const check = document.getElementById('check');

        check.onchange = () => start.disabled = !check.checked;
        start.onclick = () => {
            document.getElementById('scr-1').classList.remove('active');
            document.getElementById('scr-2').classList.add('active');
            add();
        };

        document.getElementById('next').onclick = add;

        function add() {
            document.querySelectorAll('.row').forEach(r => r.classList.remove('active-row'));
            const row = document.createElement('div');
            row.className = 'row active-row';
            const winIdx = Math.floor(Math.random() * 5);
            for(let i=0; i<5; i++) {
                const c = document.createElement('div');
                c.className = i === winIdx ? 'cell win' : 'cell';
                c.innerHTML = i === winIdx ? '🍎' : '';
                row.appendChild(c);
            }
            document.getElementById('signal-container').appendChild(row);
        }
    </script>
</body>
</html>
