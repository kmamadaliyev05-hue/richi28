<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 APPLE VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --gold: #ffcc00;
            --dark-bg: #050505;
            --shadow-green: rgba(0, 255, 65, 0.4);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* HEADER */
        .header {
            width: 100%; padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .title {
            font-size: 24px; font-weight: 900;
            letter-spacing: 2px; color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            margin: 0;
        }

        /* GAME BOARD */
        .game-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%;
        }

        .apple-board {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            box-shadow: 0 0 30px var(--shadow-green);
            margin-bottom: 30px;
        }

        .cell {
            width: 55px; height: 55px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.active {
            transform: scale(1.1);
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--neon-green);
            box-shadow: inset 0 0 10px var(--neon-green);
        }

        /* BUTTON */
        .btn-get-signal {
            width: 85%; max-width: 300px;
            padding: 18px; border: none; border-radius: 50px;
            background: linear-gradient(135deg, #00ff41 0%, #008f23 100%);
            color: black; font-size: 18px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 255, 65, 0.3);
            cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-get-signal:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0, 255, 65, 0.2); }

        /* LOADING ANIMATION */
        .loader {
            display: none; width: 24px; height: 24px;
            border: 3px solid #000; border-top: 3px solid transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* DECORATION */
        .status-bar { font-size: 14px; color: var(--neon-green); margin-bottom: 10px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">APPLE OF FORTUNE</h1>
    </div>

    <div class="game-container">
        <div class="status-bar" id="status">TIZIM TAYYOR...</div>
        
        <div class="apple-board" id="board">
            </div>

        <button class="btn-get-signal" onclick="startHack()" id="mainBtn">
            <div class="loader" id="loader"></div>
            <span id="btnText">⚡ SIGNAL OLISH</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const board = document.getElementById('board');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const mainBtn = document.getElementById('mainBtn');

        // Doskani yaratish (5x5)
        function createBoard() {
            board.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                board.appendChild(cell);
            }
        }

        async function startHack() {
            mainBtn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'XAKING...';
            status.innerText = 'SERVERGA ULANISH...';
            
            // Eski natijani tozalash
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerText = ''; c.classList.remove('active'); });

            // Professional pauzalar (reallik uchun)
            await new Promise(r => setTimeout(r, 800));
            status.innerText = 'ALGORITM TAHLIL QILINMOQDA...';
            await new Promise(r => setTimeout(r, 1200));

            // Signalni generatsiya qilish (Har bir qatordan bittadan xavfsiz olma)
            // Biz 3 ta qatorni (pastdan tepaga) ko'rsatamiz
            const rows = [4, 3, 2]; // Oxirgi 3 qator indekslari
            
            for (let r of rows) {
                const randomCol = Math.floor(Math.random() * 5);
                const cellIndex = (r * 5) + randomCol;
                const targetCell = document.getElementById(`cell-${cellIndex}`);
                
                targetCell.classList.add('active');
                targetCell.innerText = '🍎';
                status.innerText = 'SIGNAL TOPILDI!';
            }

            loader.style.display = 'none';
            btnText.innerText = 'YANGI SIGNAL';
            mainBtn.disabled = false;
        }

        createBoard();
    </script>
</body>
</html>
