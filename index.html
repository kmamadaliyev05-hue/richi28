<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACKER PORTAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon: #00ff41;
            --danger: #ff003c;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        .hacker-border {
            border: 1px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .cell {
            border: 1px solid rgba(0, 255, 65, 0.2);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            background: rgba(0, 20, 0, 0.4);
        }

        /* Hacker Format Elements */
        .cell.active-hack {
            background: var(--neon);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neon);
            animation: glitch-cell 0.2s infinite;
        }

        @keyframes glitch-cell {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); filter: hue-rotate(90deg); }
            100% { transform: scale(1); }
        }

        .game-card {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .game-card:active {
            background: var(--neon);
            color: black;
        }

        .btn-glitch {
            position: relative;
            background: transparent;
            border: 2px solid var(--neon);
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-glitch:disabled { opacity: 0.3; border-color: gray; color: gray; }

        #logs-box {
            font-size: 9px;
            color: #008f11;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <canvas id="matrix-rain"></canvas>

    <div id="loader" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-3xl font-bold tracking-[10px] mb-10 text-[#00ff41]" style="text-shadow: 0 0 15px #00ff41;">RICHI28</h1>
        <div class="w-full max-w-xs h-1 bg-gray-900 overflow-hidden relative border border-[#00ff41]">
            <div id="bar" class="h-full bg-[#00ff41] w-0 transition-all duration-100"></div>
        </div>
        <div id="logs-box" class="mt-6 w-full max-w-xs h-32 overflow-hidden leading-relaxed">
            > Initializing core_v4.0...<br>
        </div>
    </div>

    <div id="menu" class="hidden w-full p-5 z-10 flex flex-col items-center">
        <div class="w-full p-3 hacker-border bg-black/90 mb-8 text-[10px] leading-5">
            > SYSTEM: <span class="text-white">ACTIVE</span><br>
            > EXPLOIT: <span class="text-white">ACCESS_GRANTED</span><br>
            > TARGET: <span class="text-white" id="user-name">LOADING...</span>
        </div>
        
        <div class="grid grid-cols-2 gap-4 w-full">
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('APPLE OF FORTUNE', 5, 10)">[ APPLE ]</div>
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('EASTERN NIGHTS', 5, 10)">[ EASTERN ]</div>
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('WILD WEST GOLD', 2, 10)">[ WILDWEST ]</div>
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('DRAGON\'S GOLD', 5, 10)">[ DRAGON ]</div>
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('SWAMP LAND', 5, 4)">[ SWAMP ]</div>
            <div class="game-card p-4 text-center text-[10px] font-bold" onclick="selectGame('KAMIKAZE', 5, 12)">[ KAMIKAZE ]</div>
        </div>
    </div>

    <div id="hack-ui" class="hidden w-full p-4 z-10 flex flex-col items-center">
        <div class="w-full flex justify-between mb-5 items-center">
            <span onclick="goBack()" class="text-[10px] border-b border-[#00ff41] cursor-pointer">< BACK_TO_HUB</span>
            <span id="game-label" class="text-xs font-bold text-white"></span>
        </div>

        <div id="grid-container" class="grid gap-1 border-2 border-[#00ff41] p-1 bg-black/80 shadow-[0_0_30px_rgba(0,255,65,0.1)]">
            </div>

        <button id="run-btn" class="mt-8 w-full py-4 btn-glitch font-bold text-sm tracking-[5px]" onclick="executeExploit()">
            GET PREDICTION
        </button>

        <div id="cooldown" class="mt-4 text-[10px] text-red-500 hidden animate-pulse">
            SECURITY_DELAY: <span id="sec">20</span>s
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Matrix Background
        const canvas = document.getElementById('matrix-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "010101ABCDEF";
        const drops = Array.from({length: Math.floor(window.innerWidth/14)}).fill(1);
        function matrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const txt = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(txt, i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(matrix, 35);

        // Loading simulation
        let progress = 0;
        const logEntries = ["> Bypassing server...", "> Injecting payload...", "> Decrypting grid...", "> STABLE CONNECTION"];
        const loadInt = setInterval(() => {
            progress += 1.5;
            document.getElementById('bar').style.width = progress + "%";
            if(Math.floor(progress) % 25 === 0) {
                document.getElementById('logs-box').innerHTML += logEntries[Math.floor(progress/25)-1] + "<br>";
            }
            if(progress >= 100) {
                clearInterval(loadInt);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
                document.getElementById('user-name').innerText = (tg.initDataUnsafe.user?.first_name || "AGENT_X").toUpperCase();
            }
        }, 30);

        // Game Engine
        let activeGame = { c: 0, r: 0 };
        function selectGame(name, c, r) {
            activeGame = { c, r };
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hack-ui').style.display = 'flex';
            document.getElementById('game-label').innerText = name;
            
            const g = document.getElementById('grid-container');
            g.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
            g.innerHTML = '';
            for(let i=0; i < c*r; i++) {
                g.innerHTML += `<div class="cell h-10 w-10">0x${Math.floor(Math.random()*16).toString(16)}</div>`;
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        function goBack() {
            document.getElementById('hack-ui').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        function executeExploit() {
            const btn = document.getElementById('run-btn');
            const timer = document.getElementById('cooldown');
            const cells = document.querySelectorAll('.cell');
            
            btn.disabled = true;
            btn.innerText = "INJECTING...";
            tg.HapticFeedback.impactOccurred('heavy');

            // Reset cells
            cells.forEach(c => { 
                c.classList.remove('active-hack'); 
                c.innerHTML = `0x${Math.floor(Math.random()*16).toString(16)}`;
                c.style.opacity = "0.3";
            });

            setTimeout(() => {
                // Prediction logic: TZ bo'yicha pastdan tepaga 3 ta qator
                const stepCount = activeGame.r > 5 ? 3 : activeGame.r;
                
                for(let i=0; i < stepCount; i++) {
                    const rowIdx = (activeGame.r - 1) - i;
                    const randomCol = Math.floor(Math.random() * activeGame.c);
                    const targetIdx = (rowIdx * activeGame.c) + randomCol;

                    setTimeout(() => {
                        cells[targetIdx].classList.add('active-hack');
                        cells[targetIdx].innerHTML = "HACK";
                        cells[targetIdx].style.opacity = "1";
                        tg.HapticFeedback.notificationOccurred('success');
                    }, i * 500);
                }

                // Cooldown timer
                btn.style.display = 'none';
                timer.style.display = 'block';
                let timeLeft = 20;
                const cd = setInterval(() => {
                    timeLeft--;
                    document.getElementById('sec').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(cd);
                        btn.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = "GET PREDICTION";
                        timer.style.display = 'none';
                    }
                }, 1000);
            }, 1500);
        }
    </script>
</body>
</html>
