<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACK VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #000;
            --warn: #ff3131;
            --glass: rgba(0, 255, 65, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }

        /* MATRIX RAIN CANVAS */
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.2; }

        /* 1. TERMINAL BOOT */
        #boot { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .glitch-logo { font-size: 1.8rem; font-weight: bold; text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; }
        .loader-wrap { width: 80%; max-width: 280px; border: 1px solid var(--neon); padding: 2px; border-radius: 2px; }
        #bar { width: 0%; height: 12px; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.1s; }

        /* 2. MAIN LOBBY */
        #main { display: none; height: 100vh; overflow-y: auto; padding: 15px; position: relative; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: rgba(0,0,0,0.8); z-index: 10; }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: var(--glass); border: 1px solid var(--neon); border-radius: 8px; padding: 15px 5px; text-align: center; transition: 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.95); background: rgba(0, 255, 65, 0.2); }
        .card i { font-size: 1.8rem; display: block; margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 0.7rem; text-transform: uppercase; color: #fff; }
        .card span { font-size: 0.6rem; color: var(--neon); opacity: 0.8; }

        /* 3. GAME VIEW */
        #game-view { display: none; padding: 15px; text-align: center; height: 100vh; overflow-y: auto; }
        .back-btn { float: left; border: 1px solid var(--neon); padding: 5px 12px; cursor: pointer; font-size: 0.75rem; border-radius: 4px; }
        .signal-area { min-height: 320px; border: 1px dashed var(--neon); margin: 20px 0; background: rgba(0,10,0,0.9); display: flex; align-items: center; justify-content: center; position: relative; border-radius: 8px; }
        .hack-btn { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 20px var(--neon); cursor: pointer; border-radius: 6px; text-transform: uppercase; }
        .hack-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* GRIDS FOR GAMES */
        .grid-container { display: grid; gap: 5px; padding: 10px; }
        .cell-apple { width: 42px; height: 42px; border: 1px solid rgba(0,255,65,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .cell-mines { width: 50px; height: 50px; border: 1px solid rgba(0,255,65,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(0,255,65,0.05); }

        /* MISC */
        .warn { color: var(--warn); border: 1px solid var(--warn); padding: 12px; font-size: 0.65rem; margin: 20px 0; line-height: 1.4; text-transform: uppercase; border-radius: 4px; }
        .footer-link { opacity: 0.6; font-size: 0.75rem; text-decoration: underline; margin: 20px 0 40px 0; display: inline-block; cursor: pointer; }
        
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
        .signal-area::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,65,0.1); animation: scanline 3s linear infinite; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="boot">
    <div class="glitch-logo">RICHI28 HACK v4.0</div>
    <div id="boot-status" style="font-size:0.7rem; margin-bottom: 10px;">INITIALIZING KERNEL...</div>
    <div class="loader-wrap"><div id="bar"></div></div>
</div>

<div id="main">
    <div class="nav">
        <span style="font-size: 0.8rem;">HACKER@RICHI28:~#</span>
        <select id="lang" onchange="updateLanguage()" style="background:transparent; color:var(--neon); border:1px solid var(--neon); border-radius:4px; padding: 2px 5px;">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="lobby">
        <div class="game-grid" id="game-list"></div>
        <div class="warn" id="warn-box"></div>
        <center><span class="footer-link" onclick="sendSupport()" id="support-btn"></span></center>
    </div>

    <div id="game-view">
        <div class="back-btn" onclick="backToLobby()">⬅️ <span id="back-txt"></span></div>
        <h2 id="current-game-title" style="clear:both; padding-top:20px; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon);"></h2>
        <div id="console-output" style="font-size: 0.6rem; height: 20px; color: #fff; margin-bottom: 5px; opacity: 0.8;"></div>
        <div class="signal-area" id="signal-screen">
            <div style="opacity:0.3; font-size: 0.8rem;">[ AWAITING INPUT ]</div>
        </div>
        <button class="hack-btn" id="hack-btn" onclick="executeHack()"></button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    // 1. MATRIX ENGINE
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    let cw = canvas.width = window.innerWidth;
    let ch = canvas.height = window.innerHeight;
    const charList = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%&*";
    const fontSize = 14;
    const columns = Math.floor(cw / fontSize);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, cw, ch);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = charList[Math.floor(Math.random() * charList.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > ch && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 40);

    // 2. DATA
    const gameData = [
        { id: 'apple', n: "Apple of Fortune", i: "🍎", kf: "x1.23 - x349" },
        { id: 'crash', n: "Crash", i: "🚀", kf: "x1.00 - x100+" },
        { id: 'mines', n: "Gems & Mines", i: "💣", kf: "x1.05 - x1,000+" },
        { id: 'kamikaze', n: "Kamikaze", i: "✈️", kf: "x1.21 - x15.4" },
        { id: 'nights', n: "Eastern Nights", i: "🪔", kf: "x1.18 - x349" },
        { id: 'thimbles', n: "Thimbles", i: "🥤", kf: "x1.45 - x2.91" },
        { id: 'wildwest', n: "Wild West Gold", i: "💰", kf: "x2.00 - x3.00" },
        { id: 'dragons', n: "Dragon's Gold", i: "🪙", kf: "x1.23 - x349" },
        { id: 'swamp', n: "Swamp Land", i: "🐸", kf: "x1.20 - x14.5" },
        { id: 'underover', n: "Under/Over 7", i: "🎲", kf: "x2.3 - x5.8" }
    ];

    const lang = {
        uz: { warn: "⚠️ DIQQAT: Agar siz RICHI28 promokodidan o‘tmagan bo‘lsangiz yoki hisobingizda minimal 60,000 UZS bo‘lmasa, tizim noto‘g‘ri signal berishi mumkin!", support: "[ 💡 TAKLIF VA MUROJAAT ]", back: "ORTGA", btn: "⚡️ SIGNAL OLISH", logs: ["Paketlar yuborilmoqda...", "Xavfsizlik devori chetlab o'tildi...", "Ma'lumotlar tahlil qilinmoqda...", "Signal topildi!"] },
        ru: { warn: "⚠️ ВНИМАНИЕ: Если вы не использовали промокод RICHI28 или ваш баланс менее 500 RUB, система может выдать ложный сигнал!", support: "[ 💡 ПРЕДЛОЖЕНИЯ ]", back: "НАЗАД", btn: "⚡️ ПОЛУЧИТЬ СИГНАЛ", logs: ["Отправка пакетов...", "Обход брандмауэра...", "Анализ данных...", "Сигнал найден!"] },
        en: { warn: "⚠️ WARNING: If you haven't used RICHI28 promo or your balance is below $5, the system might provide incorrect signals!", support: "[ 💡 FEEDBACK & SUPPORT ]", back: "BACK", btn: "⚡️ GET SIGNAL", logs: ["Sending packets...", "Bypassing firewall...", "Analysing data...", "Signal found!"] }
    };

    let currentID = null;

    // 3. CORE LOGIC
    function init() {
        let progress = 0;
        const bar = document.getElementById("bar");
        const status = document.getElementById("boot-status");
        
        const bootTimer = setInterval(() => {
            progress += Math.floor(Math.random() * 15);
            if(progress >= 100) {
                progress = 100;
                clearInterval(bootTimer);
                setTimeout(() => {
                    document.getElementById("boot").style.display = "none";
                    document.getElementById("main").style.display = "block";
                }, 400);
            }
            bar.style.width = progress + "%";
            status.innerText = `LOADING MODULES... ${progress}%`;
        }, 120);

        renderLobby();
        updateLanguage();
    }

    function renderLobby() {
        const grid = document.getElementById("game-list");
        gameData.forEach(game => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<i>${game.i}</i><h3>${game.n}</h3><span>${game.kf}</span>`;
            card.onclick = () => selectGame(game);
            grid.appendChild(card);
        });
    }

    function updateLanguage() {
        const l = document.getElementById("lang").value;
        document.getElementById("warn-box").innerText = lang[l].warn;
        document.getElementById("support-btn").innerText = lang[l].support;
        document.getElementById("back-txt").innerText = lang[l].back;
        document.getElementById("hack-btn").innerText = lang[l].btn;
    }

    function selectGame(game) {
        currentID = game.id;
        document.getElementById("lobby").style.display = "none";
        document.getElementById("game-view").style.display = "block";
        document.getElementById("current-game-title").innerText = game.n.toUpperCase();
        document.getElementById("signal-screen").innerHTML = `<div style="opacity:0.3">[ SYSTEM READY ]</div>`;
    }

    function backToLobby() {
        document.getElementById("game-view").style.display = "none";
        document.getElementById("lobby").style.display = "block";
    }

    function executeHack() {
        const btn = document.getElementById("hack-btn");
        const out = document.getElementById("console-output");
        const screen = document.getElementById("signal-screen");
        const l = document.getElementById("lang").value;
        
        btn.disabled = true;
        screen.innerHTML = `<div class="glitch-logo" style="font-size:1.2rem">DECRYPTING...</div>`;
        
        let step = 0;
        const logInt = setInterval(() => {
            out.innerText = lang[l].logs[step];
            step++;
            if(step >= lang[l].logs.length) {
                clearInterval(logInt);
                showSignal(currentID, screen);
                btn.disabled = false;
            }
        }, 600);
    }

    function showSignal(id, box) {
        box.innerHTML = "";
        let content = "";

        // GRID BASED GAMES (Apple, Mines, etc.)
        if(['apple', 'kamikaze', 'nights', 'dragons', 'wildwest', 'swamp'].includes(id)) {
            const cols = 5;
            const rows = id === 'apple' ? 10 : 5;
            content = `<div class="grid-container" style="grid-template-columns: repeat(${cols}, 1fr);">`;
            const icon = {apple:'🍎', kamikaze:'✈️', nights:'🪔', dragons:'🪙', wildwest:'💰', swamp:'🐸'}[id];
            
            for(let r=0; r<rows; r++) {
                const safeIdx = Math.floor(Math.random() * cols);
                for(let c=0; c<cols; c++) {
                    content += `<div class="cell-apple">${c === safeIdx ? icon : ''}</div>`;
                }
            }
            content += `</div>`;
        } 
        else if (id === 'mines') {
            content = `<div class="grid-container" style="grid-template-columns: repeat(5, 1fr);">`;
            let mines = Array(25).fill('💎');
            let bombIndices = [];
            while(bombIndices.length < 3) {
                let r = Math.floor(Math.random() * 25);
                if(!bombIndices.includes(r)) bombIndices.push(r);
            }
            bombIndices.forEach(idx => mines[idx] = '💣');
            mines.forEach(m => content += `<div class="cell-mines">${m}</div>`);
            content += `</div>`;
        }
        else if (id === 'crash') {
            const val = (Math.random() * 2.8 + 1.1).toFixed(2);
            content = `<div><div style="font-size:3.5rem; font-weight:bold; color:#fff;">x${val}</div><div style="font-size:3rem; margin-top:10px;">🛑</div></div>`;
        }
        else if (id === 'thimbles') {
            const pos = Math.floor(Math.random() * 3);
            content = `<div style="display:flex; gap:10px; font-size:3.5rem;">
                <div>${pos===0?'⚪️':'🥤'}</div><div>${pos===1?'⚪️':'🥤'}</div><div>${pos===2?'⚪️':'🥤'}</div>
            </div>`;
        }
        else if (id === 'underover') {
            const options = ["UNDER 7", "7", "OVER 7"];
            const res = options[Math.floor(Math.random() * 3)];
            content = `<div><div style="font-size:3.5rem;">🎲</div><div style="background:var(--neon); color:#000; font-weight:bold; padding:5px 15px; border-radius:4px;">${res}</div></div>`;
        }

        box.innerHTML = content;
    }

    function sendSupport() {
        const user = tg.initDataUnsafe.user?.first_name || "User";
        const msg = prompt(`${user}, muammo yoki taklifingizni yozing:`);
        if(msg) {
            tg.sendData(JSON.stringify({type: "support", user: user, text: msg}));
            alert("Xabaringiz adminga yuborildi!");
        }
    }

    window.onload = init;
</script>
</body>
</html>
