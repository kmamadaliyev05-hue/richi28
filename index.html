<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHI28 HACK PORTAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #000000;
            --warning-red: #ff3131;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            height: 100%;
        }

        /* MATRIX RAIN CANVAS */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        /* 1. BOOT SEQUENCE */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .loader-bar {
            width: 250px;
            height: 10px;
            border: 1px solid var(--neon-green);
            margin-top: 20px;
        }

        #progress { width: 0%; height: 100%; background: var(--neon-green); }

        /* 2. LOBBY */
        #lobby {
            display: none;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .game-card {
            border: 1px solid var(--neon-green);
            padding: 15px;
            text-align: center;
            background: rgba(0, 255, 65, 0.1);
            cursor: pointer;
        }

        /* 3. SIGNAL AREA (MAKSIMAL REALISTIK) */
        #game-view {
            display: none;
            padding: 20px;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin: 20px auto;
            max-width: 300px;
            background: rgba(0, 255, 65, 0.05);
            padding: 10px;
            border: 1px solid var(--neon-green);
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid rgba(0, 255, 65, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .signal-btn {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-green);
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .warning { color: var(--warning-red); font-size: 0.7rem; margin-top: 20px; text-align: center; }

        .back-btn { float: left; cursor: pointer; border: 1px solid var(--neon-green); padding: 5px 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="boot-screen">
        <h1 style="letter-spacing: 5px;">RICHI28 HACK</h1>
        <div id="boot-text">System loading...</div>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="lobby">
        <div class="header">
            <span>TERMINAL v4.5</span>
            <select id="lang-select" onchange="updateLang()" style="background: black; color: var(--neon-green); border: 1px solid var(--neon-green);">
                <option value="uz">UZ</option>
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>

        <div class="game-grid" id="game-list"></div>

        <div class="warning" id="warning-text"></div>
        <div style="text-align:center; margin-top:20px; opacity:0.5; font-size:0.8rem;" onclick="sendSupport()">[ 💡 TAKLIF VA MUROJAAT ]</div>
    </div>

    <div id="game-view">
        <div class="back-btn" onclick="showLobby()">⬅️ ORTGA</div>
        <h2 id="game-title" style="clear:both;">GAME</h2>
        
        <div id="signal-area">
            </div>

        <button class="signal-btn" onclick="getSignal()">⚡️ GET SIGNAL</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. MATRIX EFFECT
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // 2. GAMES DATA
        const games = [
            { id: 'apple', name: "Apple of Fortune", logo: "🍎", kf: "x1.23 - x349" },
            { id: 'crash', name: "Crash", logo: "🚀", kf: "x1.00 - x100+" },
            { id: 'mines', name: "Gems & Mines", logo: "💣", kf: "x1.05 - x1,000+" },
            { id: 'thimbles', name: "Thimbles", logo: "🥤", kf: "x1.45 - x2.91" },
            { id: 'kamikaze', name: "Kamikaze", logo: "✈️", kf: "x1.21 - x15.4" },
            { id: 'over7', name: "Under/Over 7", logo: "🎲", kf: "x2.3 - x5.8" },
            { id: 'nights', name: "Eastern Nights", logo: "🪔", kf: "x1.18 - x349" },
            { id: 'dragons', name: "Dragon's Gold", icon: "🪙", kf: "x1.23 - x349" },
            { id: 'wildwest', name: "Wild West Gold", icon: "💰", kf: "x2.00 - x3.00" },
            { id: 'swamp', name: "Swamp Land", icon: "🐸", kf: "x1.20 - x14.5" }
        ];

        // 3. LOGIC
        let activeGame = null;

        function init() {
            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 10;
                document.getElementById('progress').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('lobby').style.display = 'block';
                }
            }, 150);

            const list = document.getElementById('game-list');
            games.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<div>${g.logo || g.icon}</div><h3>${g.name}</h3><div style="font-size:0.7rem">${g.kf}</div>`;
                card.onclick = () => openGame(g);
                list.appendChild(card);
            });
            updateLang();
        }

        function openGame(game) {
            activeGame = game;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('game-title').innerText = game.name;
            document.getElementById('signal-area').innerHTML = `<div style="padding:40px; border:1px dashed var(--neon-green)">READY TO SCAN</div>`;
        }

        function showLobby() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
        }

        function getSignal() {
            const area = document.getElementById('signal-area');
            area.innerHTML = `<div style="font-size:0.8rem">BYPASSING...<br>ANALYZING DATABASE...</div>`;
            
            setTimeout(() => {
                renderSignalLogic(activeGame.id, area);
            }, 1500);
        }

        function renderSignalLogic(id, container) {
            container.innerHTML = "";
            
            if (id === 'apple' || id === 'mines' || id === 'dragons' || id === 'wildwest') {
                const grid = document.createElement('div');
                grid.className = 'grid-container';
                const icon = id === 'apple' ? '🍎' : (id === 'mines' ? '💎' : (id === 'dragons' ? '🪙' : '💰'));
                for(let i=0; i<25; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(Math.random() > 0.7) cell.innerText = icon;
                    grid.appendChild(cell);
                }
                container.appendChild(grid);
            } 
            else if (id === 'crash') {
                const val = (Math.random() * 3 + 1).toFixed(2);
                container.innerHTML = `<div style="font-size:1.5rem">STOP AT:</div><div style="font-size:4rem; color:white">x${val}</div><div style="font-size:3rem">🛑</div>`;
            }
            else if (id === 'thimbles') {
                const pos = Math.floor(Math.random() * 3);
                let t = `<div style="display:flex; justify-content:center; gap:20px; font-size:3rem">`;
                for(let i=0; i<3; i++) t += `<div>${i === pos ? '⚪️' : '🥤'}</div>`;
                container.innerHTML = t + `</div>`;
            }
            else {
                container.innerHTML = `<div style="font-size:3rem">🎯</div><div style="font-size:1.5rem">SIGNAL SECURED</div>`;
            }
        }

        function updateLang() {
            const l = document.getElementById('lang-select').value;
            const w = document.getElementById('warning-text');
            const texts = {
                uz: "⚠️ DIQQAT: Hisobingizda minimal 60,000 UZS bo'lmasa, bloklanish xavfi bor!",
                ru: "⚠️ ВНИМАНИЕ: Если на счету менее 500 RUB, возможна блокировка!",
                en: "⚠️ WARNING: Minimum 5 USD required to avoid account block!"
            };
            w.innerText = texts[l];
        }

        init();
    </script>
</body>
</html>
