<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 MULTI-HACK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --hacker-green: #00ff41;
            --dark-bg: #050505;
            --border-glow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--hacker-green);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Matrix Background */
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.2;
        }

        /* O'yinlar ro'yxati (Asosiy sahifa) */
        #menu-screen {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            z-index: 10;
        }

        .menu-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--hacker-green);
            padding-bottom: 10px;
            box-shadow: 0 5px 10px -5px var(--hacker-green);
        }

        .game-card {
            background: rgba(0, 40, 0, 0.1);
            border: 1px solid var(--hacker-green);
            padding: 15px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--border-glow);
            transition: 0.3s;
        }

        .game-card:active {
            transform: scale(0.95);
            background: var(--hacker-green);
            color: black;
        }

        /* O'yin ekrani (Signal qismi) */
        #game-screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .back-btn {
            margin-top: 15px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        .terminal-header {
            width: 90%;
            margin-top: 10px;
            border: 1px solid var(--hacker-green);
            padding: 8px;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.8);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid var(--hacker-green);
            background: rgba(0, 40, 0, 0.2);
            position: relative;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #003300;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.hack-active {
            border-color: var(--hacker-green);
            box-shadow: inset 0 0 10px var(--hacker-green);
            background: rgba(0, 255, 65, 0.2);
        }

        .cell img {
            width: 30px;
            filter: sepia(100%) hue-rotate(70deg) brightness(1.5);
            display: none;
        }

        .hack-btn {
            background: black;
            color: var(--hacker-green);
            border: 2px solid var(--hacker-green);
            padding: 15px;
            width: 90%;
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            box-shadow: var(--border-glow);
        }

        .scanner {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--hacker-green);
            box-shadow: 0 0 20px var(--hacker-green);
            display: none;
            top: 0;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="menu-screen">
        <div class="menu-title">SELECT VULNERABILITY</div>
        
        <div class="game-card" onclick="openGame('APPLE OF FORTUNE')">
            <span>APPLE OF FORTUNE</span>
            <span>[v2.1]</span>
        </div>

        <div class="game-card" onclick="openGame('MINES')">
            <span>MINES</span>
            <span>[v1.0]</span>
        </div>

        <div class="game-card" onclick="openGame('CRASH')">
            <span>CRASH (AVIA)</span>
            <span>[v4.5]</span>
        </div>

        <div class="game-card" onclick="openGame('SUPER MARIO')">
            <span>SUPER MARIO</span>
            <span>[v0.8]</span>
        </div>
    </div>

    <div id="game-screen">
        <div class="back-btn" onclick="showMenu()">< BACK TO LIST</div>
        <h2 id="current-game-title">APPLE OF FORTUNE</h2>
        
        <div class="terminal-header" id="terminal-info">
            TARGET: SERVER_BYPASS<br>
            STATUS: WAITING_INJECTION
        </div>

        <div class="game-grid" id="grid">
            <div class="scanner" id="scanner"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <button class="hack-btn" onclick="runHack()">GET PREDICTION</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const chars = "01";
        const fontSize = 12;
        const columns = canvas.width/fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = chars.charAt(Math.floor(Math.random()*chars.length));
                ctx.fillText(text, i*fontSize, y*fontSize);
                if(y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 40);

        // Navigation
        function openGame(name) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('current-game-title').innerText = name;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function showMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            resetGrid();
        }

        function resetGrid() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.classList.remove('hack-active'); c.innerHTML = ''; });
        }

        // Hack Logic
        function runHack() {
            resetGrid();
            const cells = document.querySelectorAll('.cell');
            const scanner = document.getElementById('scanner');
            const term = document.getElementById('terminal-info');

            tg.HapticFeedback.impactOccurred('heavy');
            term.innerHTML = "INJECTING EXPLOIT...<br>BYPASSING FIREWALL...";
            
            scanner.style.display = "block";
            scanner.animate([{top: '0%'}, {top: '100%'}], {duration: 1000, iterations: 2});

            setTimeout(() => {
                term.innerHTML = "SUCCESS: ACCESS_GRANTED<br>DATA_EXTRACTED";
                
                // 3 qatorga signal berish
                for(let i=0; i<3; i++) {
                    const rand = Math.floor(Math.random()*5) + (i*5);
                    setTimeout(() => {
                        cells[rand].classList.add('hack-active');
                        cells[rand].innerHTML = '<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png" style="display:block">';
                        tg.HapticFeedback.notificationOccurred('success');
                    }, i*500);
                }
                
                setTimeout(() => { scanner.style.display = "none"; }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
