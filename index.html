<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHI28 HACK PORTAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --warning-red: #ff3131;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. BOOT SEQUENCE */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .glitch {
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .loader-bar {
            width: 250px;
            height: 20px;
            border: 1px solid var(--neon-green);
            margin-top: 20px;
            position: relative;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: var(--neon-green);
            transition: width 0.3s;
        }

        /* 2. LOBBY AREA */
        #lobby {
            display: none;
            width: 95%;
            max-width: 500px;
            padding-top: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .game-card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon-green);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-card:active { transform: scale(0.95); background: rgba(0, 255, 65, 0.2); }

        .game-card h3 { margin: 5px 0; font-size: 0.9rem; }
        .kf { color: #fff; font-size: 0.8rem; opacity: 0.8; }

        /* 3. GAME VIEW */
        #game-view {
            display: none;
            width: 100%;
            text-align: center;
            padding-top: 50px;
        }

        .signal-btn {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .result-box {
            margin-top: 40px;
            font-size: 3rem;
            min-height: 100px;
        }

        .warning-footer {
            color: var(--warning-red);
            font-size: 0.7rem;
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(255, 49, 49, 0.3);
            margin-top: 20px;
        }

        .back-btn { align-self: flex-start; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="glitch">RICHI28 HACK</div>
        <div id="status-text">Analysing database...</div>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="lobby">
        <div class="header">
            <span>TERMINAL v4.0</span>
            <select id="lang-select" onchange="changeLang()">
                <option value="uz">UZ</option>
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>

        <div class="game-grid" id="game-list">
            </div>

        <div class="warning-footer" id="warning-text">
            ⚠️ DIQQAT: Agar siz RICHI28 promokodidan o‘tmagan bo‘lsangiz yoki hisobingizda minimal 60,000 UZS depozit bo‘lmasa, tizim noto‘g‘ri signal berishi mumkin!
        </div>
        
        <div style="text-align:center; font-size: 0.8rem; opacity: 0.5; margin-top:10px;" onclick="sendSupport()">
            [ 💡 TAKLIF VA MUROJAAT ]
        </div>
    </div>

    <div id="game-view">
        <div class="back-btn" onclick="showLobby()">⬅️ ORTGA</div>
        <h2 id="current-game-title">GAME</h2>
        <div id="hack-animation" style="font-size: 0.8rem; height: 40px;"></div>
        <div class="result-box" id="signal-result">?</div>
        <button class="signal-btn" onclick="getSignal()">⚡️ GET SIGNAL</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const games = [
            { name: "Apple of Fortune", logo: "🍎", kf: "x1.23 - x349", signal: "🍎" },
            { name: "Crash", logo: "🚀", kf: "x1.00 - x100+", signal: "🛑 STOP x2.54" },
            { name: "Gems & Mines", logo: "💣", kf: "x1.05 - x1,000+", signal: "💎 💎 💣" },
            { name: "Thimbles", logo: "🥤", kf: "x1.45 - x2.91", signal: "⚪️" },
            { name: "Kamikaze", logo: "✈️", kf: "x1.21 - x15.4", signal: "✈️" }
        ];

        // 1. Boot Sequence
        let width = 0;
        const progress = document.getElementById('progress');
        const bootScreen = document.getElementById('boot-screen');
        const lobby = document.getElementById('lobby');

        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                bootScreen.style.display = 'none';
                lobby.style.display = 'block';
            } else {
                width += Math.random() * 10;
                progress.style.width = width + '%';
            }
        }, 200);

        // 2. Render Games
        const gameList = document.getElementById('game-list');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<div>${game.logo}</div><h3>${game.name}</h3><div class="kf">${game.kf}</div>`;
            card.onclick = () => openGame(game);
            gameList.appendChild(card);
        });

        // 3. Logic Functions
        let selectedGame = null;

        function openGame(game) {
            selectedGame = game;
            lobby.style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('current-game-title').innerText = game.name;
            document.getElementById('signal-result').innerText = '?';
        }

        function showLobby() {
            document.getElementById('game-view').style.display = 'none';
            lobby.style.display = 'block';
        }

        function getSignal() {
            const anim = document.getElementById('hack-animation');
            const res = document.getElementById('signal-result');
            res.innerText = "⏳";
            
            const steps = ["Bypassing security...", "Scanning grid...", "Infecting server...", "Signal Ready!"];
            let i = 0;
            const stepInterval = setInterval(() => {
                anim.innerText = steps[i];
                i++;
                if(i >= steps.length) {
                    clearInterval(stepInterval);
                    res.innerText = selectedGame.signal;
                    anim.innerText = "";
                }
            }, 600);
        }

        function changeLang() {
            const lang = document.getElementById('lang-select').value;
            const warn = document.getElementById('warning-text');
            if(lang === 'en') {
                warn.innerText = "⚠️ ATTENTION: If you haven't used RICHI28 promo or have less than $5 deposit, the system may fail!";
            } else if(lang === 'ru') {
                warn.innerText = "⚠️ ВНИМАНИЕ: Если вы не ввели промокод RICHI28 или у вас меньше 500 RUB, система может ошибиться!";
            } else {
                warn.innerText = "⚠️ DIQQAT: Agar siz RICHI28 promokodidan o‘tmagan bo‘lsangiz yoki hisobingizda minimal 60,000 UZS depozit bo‘lmasa, tizim noto‘g‘ri signal berishi mumkin!";
            }
        }

        function sendSupport() {
            const msg = prompt("Murojaatingizni yozing:");
            if(msg) {
                tg.sendData(JSON.stringify({type: 'support', text: msg}));
                alert("Yuborildi!");
            }
        }
    </script>
</body>
</html>
