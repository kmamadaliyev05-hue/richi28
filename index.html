<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 MULTI-SIGNALS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header { font-size: 22px; font-weight: 800; color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.5); margin-bottom: 10px; }
        
        /* Ilovalar ro'yxati */
        .app-selector { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .app-card { min-width: 100px; background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; font-size: 12px; transition: 0.3s; }
        .app-card.active { border-color: #ff0000; background: rgba(255,0,0,0.1); }

        .promo-box { background: rgba(255, 255, 255, 0.05); border: 1px dashed #ff0000; padding: 12px; border-radius: 10px; margin: 10px 0; cursor: pointer; }
        
        .game-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 280px; margin: 15px auto; background: #111; padding: 12px; border-radius: 15px; border: 2px solid #222; }
        .cell { width: 100%; aspect-ratio: 1; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #333; }
        
        .btn { background: linear-gradient(135deg, #ff0000, #990000); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-reg { background: linear-gradient(135deg, #222, #444); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">RICHI28 PREMIUM</div>

    <!-- Ilovalarni tanlash -->
    <div class="app-selector" id="appSelector">
        <div class="app-card active" onclick="selectApp(this, '1XBET')">1XBET</div>
        <div class="app-card" onclick="selectApp(this, 'LINEBET')">LINEBET</div>
        <div class="app-card" onclick="selectApp(this, 'WINWIN')">WINWIN</div>
        <div class="app-card" onclick="selectApp(this, '888STARZ')">888STARZ</div>
    </div>

    <div class="promo-box" onclick="copyPromo()">
        <small style="color: #888;">Bonus uchun promo-kod (nusxalash):</small><br>
        <strong id="promo" style="font-size: 20px;">RICHI28</strong>
    </div>

    <div class="game-grid" id="grid"></div>
    
    <button class="btn" onclick="generateSignal()">🍎 SIGNAL OLISH</button>
    <button class="btn btn-reg" onclick="openReg()">📱 RO'YXATDAN O'TISH</button>

    <script>
        let currentApp = '1XBET';
        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        function selectApp(el, app) {
            document.querySelectorAll('.app-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentApp = app;
        }

        function copyPromo() {
            navigator.clipboard.writeText("RICHI28");
            alert("RICHI28 nusxalandi! ✅");
        }

        function openReg() {
            // Bu yerga o'z hamkorlik linkingizni qo'yishingiz mumkin
            alert(currentApp + " uchun RICHI28 promo-kodi bilan ro'yxatdan o'ting!");
            window.open('https://google.com', '_blank'); 
        }

        function generateSignal() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.innerHTML = '');
            for (let row = 0; row < 3; row++) {
                const randomCol = Math.floor(Math.random() * 5);
                const index = (row * 5) + randomCol;
                setTimeout(() => {
                    cells[index].innerHTML = '🍎';
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }, row * 150);
            }
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
