<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACK VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #000;
            --warn: #ff3131;
            --glass: rgba(0, 255, 65, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }

        /* MATRIX RAIN */
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.25; }

        /* 1. TERMINAL BOOT */
        #boot { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .glitch-logo { font-size: 2rem; font-weight: bold; text-shadow: 0 0 15px var(--neon); animation: blink 0.1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .loader-wrap { width: 250px; margin-top: 20px; border: 1px solid var(--neon); padding: 2px; }
        #bar { width: 0%; height: 10px; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* 2. MAIN LOBBY */
        #main { display: none; height: 100vh; overflow-y: auto; padding: 15px; position: relative; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--glass); border: 1px solid var(--neon); border-radius: 8px; padding: 15px 5px; text-align: center; transition: 0.3s; cursor: pointer; }
        .card:active { transform: scale(0.95); background: rgba(0, 255, 65, 0.3); }
        .card i { font-size: 1.8rem; display: block; margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 0.75rem; text-transform: uppercase; color: #fff; }
        .card span { font-size: 0.65rem; color: var(--neon); opacity: 0.8; }

        /* 3. GAME VIEW */
        #game-view { display: none; padding: 15px; text-align: center; height: 100vh; overflow-y: auto; }
        .back-btn { float: left; border: 1px solid var(--neon); padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        .signal-area { min-height: 300px; border: 2px dashed var(--neon); margin: 20px 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; position: relative; }
        .hack-btn { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 20px var(--neon); cursor: pointer; border-radius: 4px; }
        .hack-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* GAME SPECIFIC GRIDS */
        .grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .grid-cell { width: 45px; height: 45px; border: 1px solid rgba(0,255,65,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .crash-val { font-size: 4rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px var(--neon); }

        /* FOOTER & WARNING */
        .warn { color: var(--warn); border: 1px solid var(--warn); padding: 10px; font-size: 0.7rem; margin: 20px 0; line-height: 1.4; text-transform: uppercase; }
        .footer-link { opacity: 0.5; font-size: 0.8rem; text-decoration: underline; margin-bottom: 30px; display: block; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="boot">
    <div class="glitch-logo">RICHI28 HACK</div>
    <div id="status" style="margin-top:15px; font-size:0.7rem;">CONNECTING TO SERVER...</div>
    <div class="loader-wrap"><div id="bar"></div></div>
</div>

<div id="main">
    <div class="nav">
        <span>ROOT@RICHI28:~#</span>
        <select id="lang" onchange="updateLang()" style="background:transparent; color:var(--neon); border:1px solid var(--neon); outline:none;">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="lobby">
        <div class="game-grid" id="game-list"></div>
        <div class="warn" id="warn-box"></div>
        <center><span class="footer-link" onclick="sendSupport()" id="support-label"></span></center>
    </div>

    <div id="game-view">
        <div class="back-btn" onclick="goHome()">⬅️ <span id="back-label">BACK</span></div>
        <h2 id="g-name" style="clear:both; padding-top:20px; letter-spacing:3px;"></h2>
        <div id="log-console" style="font-size: 0.6rem; height: 20px; margin-bottom: 5px;"></div>
        <div class="signal-area" id="screen">
            <div style="opacity:0.3">SYSTEM READY</div>
        </div>
        <button class="hack-btn" id="hack-trigger" onclick="runHack()">⚡ GET SIGNAL</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // MATRIX RAIN ENGINE
    const c = document.getElementById("matrix");
    const ctx = c.getContext("2d");
    c.height = window.innerHeight; c.width = window.innerWidth;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()";
    const fontSize = 12;
    const columns = c.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px Courier New";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // TRANSLATIONS & DATA
    const games = [
        { id: 'apple', n: "Apple of Fortune", i: "🍎", kf: "x1.23 - x349" },
        { id: 'crash', n: "Crash", i: "🚀", kf: "x1.00 - x100+" },
        { id: 'kamikaze', n: "Kamikaze", i: "✈️", kf: "x1.21 - x15.4" },
        { id: 'nights', n: "Eastern Nights", i: "🪔", kf: "x1.18 - x349" },
        { id: 'wildwest', n: "Wild West Gold", i: "💰", kf: "x2.00 - x3.00" },
        { id: 'dragons', n: "Dragon's Gold", i: "🪙", kf: "x1.23 - x349" },
        { id: 'swamp', n: "Swamp Land", i: "🐸", kf: "x1.20 - x14.5" },
        { id: 'overunder', n: "Under/Over 7", i: "🎲", kf: "x2.3 - x5.8" },
        { id: 'mines', n: "Gems & Mines", i: "💣", kf: "x1.05 - x1,000+" },
        { id: 'thimbles', n: "Thimbles", i: "🥤", kf: "x1.45 - x2.91" }
    ];

    const ui = {
        uz: { warn: "⚠️ DIQQAT: Agar siz RICHI28 promokodidan o‘tmagan bo‘lsangiz yoki hisobingizda minimal 60,000 UZS depozit bo‘lmasa, tizim noto‘g‘ri signal berishi mumkin!", support: "[ 💡 TAKLIF VA MUROJAAT ]", back: "ORTGA", btn: "⚡️ SIGNAL OLISH", logs: ["Server bypass...", "Scanning grid...", "Analysing...", "Done!"] },
        ru: { warn: "⚠️ ВНИМАНИЕ: Если вы не использовали промокод RICHI28 или ваш депозит меньше 500 RUB, система может выдать неверный сигнал!", support: "[ 💡 ПРЕДЛОЖЕНИЯ ]", back: "НАЗАД", btn: "⚡️ ПОЛУЧИТЬ СИГНАЛ", logs: ["Обход сервера...", "Сканирование...", "Анализ...", "Готово!"] },
        en: { warn: "⚠️ ATTENTION: If you haven't used the RICHI28 promo code or your deposit is less than 5 USD, the system may provide false signals!", support: "[ 💡 FEEDBACK & SUPPORT ]", back: "BACK", btn: "⚡️ GET SIGNAL", logs: ["Server bypass...", "Scanning grid...", "Analysing...", "Success!"] }
    };

    let activeID = null;

    // BOOT SEQUENCE
    function init() {
        let p = 0;
        const b = document.getElementById("bar");
        const s = document.getElementById("status");
        const timer = setInterval(() => {
            p += Math.floor(Math.random() * 10);
            if(p >= 100) { p = 100; clearInterval(timer); setTimeout(()=> {
                document.getElementById("boot").style.display = "none";
                document.getElementById("main").style.display = "block";
            }, 500); }
            b.style.width = p + "%";
            s.innerText = `ANALYSING DATABASE... ${p}%`;
        }, 150);

        renderLobby();
        updateLang();
    }

    function renderLobby() {
        const list = document.getElementById("game-list");
        games.forEach(g => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<i>${g.i}</i><h3>${g.n}</h3><span>${g.kf}</span>`;
            div.onclick = () => openGame(g);
            list.appendChild(div);
        });
    }

    function updateLang() {
        const l = document.getElementById("lang").value;
        document.getElementById("warn-box").innerText = ui[l].warn;
        document.getElementById("support-label").innerText = ui[l].support;
        document.getElementById("back-label").innerText = ui[l].back;
        document.getElementById("hack-trigger").innerText = ui[l].btn;
    }

    function openGame(g) {
        activeID = g.id;
        document.getElementById("lobby").style.display = "none";
        document.getElementById("game-view").style.display = "block";
        document.getElementById("g-name").innerText = g.n.toUpperCase();
        document.getElementById("screen").innerHTML = `<div style="opacity:0.3">SYSTEM_READY</div>`;
    }

    function goHome() {
        document.getElementById("game-view").style.display = "none";
        document.getElementById("lobby").style.display = "block";
    }

    // HACK ANIMATION & LOGIC
    function runHack() {
        const btn = document.getElementById("hack-trigger");
        const log = document.getElementById("log-console");
        const screen = document.getElementById("screen");
        const l = document.getElementById("lang").value;
        
        btn.disabled = true;
        screen.innerHTML = `<div class="glitch-logo" style="font-size:1.5rem">HACKING...</div>`;
        
        let step = 0;
        const interval = setInterval(() => {
            log.innerText = ui[l].logs[step];
            step++;
            if(step >= ui[l].logs.length) {
                clearInterval(interval);
                renderSignal(activeID, screen);
                btn.disabled = false;
            }
        }, 700);
    }

    function renderSignal(id, box) {
        box.innerHTML = "";
        let html = "";

        if (['apple', 'mines', 'kamikaze', 'nights', 'dragons', 'wildwest', 'swamp'].includes(id)) {
            html = `<div class="grid-5x5">`;
            const icon = { apple:'🍎', mines:'💎', kamikaze:'✈️', nights:'🪔', dragons:'🪙', wildwest:'💰', swamp:'🐸' }[id];
            
            for(let i=0; i<25; i++) {
                // Har bir o'yin uchun maxsus random mantiq
                let isSignal = (id === 'apple' || id === 'kamikaze') ? (i % 5 === Math.floor(Math.random()*5)) : Math.random() > 0.7;
                html += `<div class="grid-cell">${isSignal ? icon : ''}</div>`;
            }
            html += `</div>`;
        } 
        else if (id === 'crash') {
            const val = (Math.random() * 3 + 1.1).toFixed(2);
            html = `<div style="text-align:center"><div class="crash-val">x${val}</div><div style="font-size:4rem">🛑</div></div>`;
        }
        else if (id === 'thimbles') {
            const pos = Math.floor(Math.random()*3);
            html = `<div style="display:flex; gap:15px; font-size:3.5rem">
                <div>${pos===0?'⚪️':'🥤'}</div><div>${pos===1?'⚪️':'🥤'}</div><div>${pos===2?'⚪️':'🥤'}</div>
            </div>`;
        }
        else if (id === 'overunder') {
            const res = ["UNDER 7", "7", "OVER 7"][Math.floor(Math.random()*3)];
            html = `<div style="text-align:center"><div style="font-size:4rem">🎲</div><div style="font-size:2rem; font-weight:bold; background:var(--neon); color:#000; padding:5px 15px;">${res}</div></div>`;
        }

        box.innerHTML = html;
    }

    function sendSupport() {
        const msg = prompt(tg.initDataUnsafe.user?.first_name + ", xabaringizni yozing:");
        if(msg) tg.sendData(JSON.stringify({type: "support", message: msg}));
    }

    init();
</script>

</body>
</html>
