<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 ANALYZER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f0f2f5; color: #1c1e21; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; color: #007aff; margin-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 280px; margin: 20px auto; }
        .cell { aspect-ratio: 1; background: #e4e6eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .cell.win { background: #34c759; color: white; transform: scale(1.05); box-shadow: 0 0 10px rgba(52,199,89,0.5); }

        .btn { background: #007aff; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        
        .promo-box { margin-top: 15px; padding: 10px; border: 2px dashed #007aff; border-radius: 10px; color: #007aff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">AI ANALYZER v4.0</div>
        <p style="font-size: 12px; color: #65676b;">Algoritm: Apple of Fortune<br>Platforma: 1XBET / LINEBET</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="promo-box" onclick="copy()">PROMO: RICHI28</div>

    <button class="btn" onclick="getSignal()">YANGI SIGNAL OLISH</button>

    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<25; i++) grid.innerHTML += '<div class="cell">?</div>';

        function copy() {
            navigator.clipboard.writeText('RICHI28');
            alert('Promo-kod nusxalandi!');
        }

        function getSignal() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.innerHTML = '?'; c.classList.remove('win'); });

            for(let i=0; i<3; i++) {
                const rand = (i * 5) + Math.floor(Math.random() * 5);
                setTimeout(() => {
                    cells[rand].innerHTML = '🍎';
                    cells[rand].classList.add('win');
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                }, (i + 1) * 400);
            }
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
