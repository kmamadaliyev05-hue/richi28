<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACKER SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --hacker-green: #00ff41;
            --dark-bg: #050505;
            --border-glow: 0 0 10px #00ff41;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--hacker-green);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .terminal-header {
            width: 90%;
            margin-top: 20px;
            border: 1px solid var(--hacker-green);
            padding: 10px;
            box-shadow: var(--border-glow);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
        }

        .system-logs {
            width: 90%;
            height: 60px;
            font-size: 10px;
            margin-top: 10px;
            overflow: hidden;
            color: #008f11;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid var(--hacker-green);
            background: rgba(0, 40, 0, 0.2);
            position: relative;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #003300;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
        }

        .cell.hack-active {
            border-color: var(--hacker-green);
            box-shadow: inset 0 0 10px var(--hacker-green);
            animation: flicker 0.1s infinite;
        }

        .cell img {
            width: 30px;
            filter: sepia(100%) hue-rotate(70deg) brightness(1.5) saturate(500%);
            display: none;
        }

        @keyframes flicker {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .control-panel {
            width: 90%;
            margin-top: 20px;
            z-index: 5;
        }

        .hack-btn {
            background: black;
            color: var(--hacker-green);
            border: 2px solid var(--hacker-green);
            padding: 15px;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: var(--border-glow);
            transition: all 0.3s;
        }

        .hack-btn:active {
            background: var(--hacker-green);
            color: black;
        }

        .scanner {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--hacker-green);
            box-shadow: 0 0 20px var(--hacker-green);
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="terminal-header">
        > RICHI28_EXPLOIT_V2.exe<br>
        > STATUS: CONNECTED_TO_SERVER<br>
        > ENCRYPTION: AES-256
    </div>

    <div class="system-logs" id="logs">
        READY TO INJECT...
    </div>

    <div class="game-grid">
        <div class="scanner" id="scanner"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <div class="control-panel">
        <button class="hack-btn" onclick="startHack()">RUN EXPLOIT</button>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = "01010101ABCDEFHIJ";
        const fontSize = 10;
        const columns = canvas.width/fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for(let i=0; i<drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random()*chars.length));
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Hacking Logic
        const tg = window.Telegram.WebApp;
        tg.expand();

        const logs = document.getElementById('logs');
        const cells = document.querySelectorAll('.cell');
        const scanner = document.getElementById('scanner');

        function addLog(text) {
            logs.innerHTML += `> ${text}<br>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function startHack() {
            tg.HapticFeedback.impactOccurred('heavy');
            cells.forEach(c => { c.classList.remove('hack-active'); c.innerHTML = ''; });
            
            addLog("SEARCHING FOR VULNERABILITIES...");
            scanner.style.display = "block";
            scanner.animate([{top: '0%'}, {top: '100%'}], {duration: 1000, iterations: 2});

            setTimeout(() => {
                addLog("SERVER BYPASSED...");
                addLog("EXTRACTING APPLE_POSITIONS...");
                
                setTimeout(() => {
                    const rows = 2;
                    for(let i=0; i<rows; i++) {
                        const rand = Math.floor(Math.random()*5) + (i*5);
                        setTimeout(() => {
                            cells[rand].classList.add('hack-active');
                            cells[rand].innerHTML = '<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png" style="display:block">';
                            tg.HapticFeedback.notificationOccurred('success');
                        }, i*400);
                    }
                    addLog("HACK COMPLETED.");
                    scanner.style.display = "none";
                }, 1000);
            }, 2000);
        }
    </script>
</body>
</html>
