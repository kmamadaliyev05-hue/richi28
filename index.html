<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACKER HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #00ff41; --bg: #050505; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'JetBrains Mono', monospace; overflow: hidden; user-select: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .hacker-card { background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon); transition: 0.3s; cursor: pointer; }
        .hacker-card:active { background: var(--neon); color: black; }
        #grid-wrapper { max-height: 55vh; overflow-y: auto; display: flex; flex-direction: column-reverse; padding: 20px 0; scrollbar-width: none; }
        #grid-wrapper::-webkit-scrollbar { display: none; }
        .row-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; transition: 0.4s; opacity: 0.3; }
        .row-container.active-row { opacity: 1; transform: scale(1.02); }
        .cell { width: 52px; height: 52px; border: 1px solid rgba(0, 255, 65, 0.3); background: rgba(0, 20, 0, 0.7); display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; }
        .cell.hack-active { background: var(--neon); color: black; box-shadow: 0 0 25px var(--neon); border: none; font-size: 24px; }
        .kf-badge { font-size: 10px; color: #fff; background: rgba(0, 0, 0, 0.8); padding: 4px; border-radius: 4px; min-width: 50px; text-align: center; border: 1px solid var(--neon); }
        .fixed-bottom { position: fixed; bottom: 20px; left: 5%; width: 90%; z-index: 100; }
        .btn-main { background: black; border: 2px solid var(--neon); width: 100%; font-weight: bold; letter-spacing: 2px; }
        /* Universal ogohlantirish dizayni */
        .bottom-warning { font-size: 8px; color: #ff003c; text-align: center; margin-bottom: 10px; line-height: 1.2; text-transform: uppercase; border: 1px solid rgba(255, 0, 60, 0.2); padding: 6px; background: rgba(255, 0, 60, 0.05); }
    </style>
</head>
<body class="flex flex-col items-center">
    <canvas id="matrix"></canvas>

    <div id="loader" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-6 text-center text-[#00ff41]">
        <h1 class="text-3xl font-bold mb-8 tracking-[10px]">RICHI28</h1>
        <div class="w-full max-w-xs h-1 bg-gray-900 border border-[#00ff41] overflow-hidden">
            <div id="bar" class="h-full bg-[#00ff41] w-0"></div>
        </div>
        <p id="loader-text" class="mt-4 text-[10px] animate-pulse"></p>
        
        <div class="mt-12 p-4 border border-red-900 bg-red-950/20 rounded-lg max-w-xs">
            <p id="warning-text" class="text-[9px] text-red-500 leading-relaxed uppercase italic"></p>
        </div>
    </div>

    <div id="menu" class="hidden w-full p-5 flex flex-col items-center z-10 h-screen pb-32 overflow-y-auto">
        <div class="w-full p-3 border border-[#00ff41] bg-black/80 mb-6 text-[10px]">
            > STATUS: <span class="text-white">ENCRYPTED</span><br>
            > BYPASS: <span class="text-white">STABLE</span>
        </div>
        <div class="grid grid-cols-1 gap-3 w-full" id="game-list"></div>
    </div>

    <div id="game-ui" class="hidden w-full p-4 flex flex-col items-center z-10">
        <div class="w-full flex justify-between items-center mb-4">
            <span id="exit-btn" onclick="location.reload()" class="text-[10px] underline text-[#00f3ff] cursor-pointer"></span>
            <span id="game-name" class="text-[10px] font-bold text-white uppercase tracking-widest text-center"></span>
            <span id="restart-btn" onclick="resetGameProgression()" class="text-[10px] border border-yellow-500 px-2 py-1 text-yellow-500 cursor-pointer"></span>
        </div>
        <div id="grid-wrapper" class="w-full"></div>
        
        <div class="fixed-bottom">
            <div id="bottom-info" class="bottom-warning"></div>
            
            <button id="hack-btn" class="btn-main py-4 text-sm" onclick="stepHack()"></button>
            <div id="cooldown" class="mt-2 text-[10px] text-red-500 hidden text-center italic"><span id="wait-label"></span>: <span id="sec">2</span>s</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'uz';

        const translations = {
            uz: {
                injecting: "> TIZIM YUKLANMOQDA...",
                warning: "⚠️ DIQQAT: Agar siz promokoddan ro'yxatdan o'tmagan yoki minimal depozit qilmagan bo'lsangiz, HACK tizimi xato signal berishi mumkin!",
                exit: "CHIQISH",
                restart: "🔄 QAYTA BOSHLASH",
                get_signal: "SIGNAL OLISH",
                wait: "KUTING",
                analyzing: "TAHLIL QILINMOQDA...",
                bottom_note: "PROMOKODDAN O'TMAGAN, DEPOZIT QILMAGAN, KANALLARGA A'ZO BO'LMAGAN YOKI 3 TA REFERAL OLIB KELMAGANLARGA HACK TIZIMI SIGNAL BERMAYDI!"
            },
            ru: {
                injecting: "> ЗАГРУЗКА СИСТЕМЫ...",
                warning: "⚠️ ВНИМАНИЕ: Если вы не зарегистрированы по промокоду или не внесли минимальный депозит, система HACK может давать неверные сигналы!",
                exit: "ВЫХОД",
                restart: "🔄 ПЕРЕЗАПУСК",
                get_signal: "ПОЛУЧИТЬ СИГНАЛ",
                wait: "ЖДИТЕ",
                analyzing: "АНАЛИЗ...",
                bottom_note: "СИСТЕМА HACK НЕ ВЫДАЕТ СИГНАЛ ТЕМ, КТО НЕ ПРОШЕЛ РЕГИСТРАЦИЮ ПО ПРОМОКОДУ, НЕ СДЕЛАЛ ДЕПОЗИТ, НЕ ПОДПИСАЛСЯ НА КАНАЛЫ ИЛИ НЕ ПРИВЕЛ 3 РЕФЕРАЛОВ!"
            },
            en: {
                injecting: "> SYSTEM LOADING...",
                warning: "⚠️ ATTENTION: If you are not registered via promo code or haven't made a minimum deposit, the HACK system may give incorrect signals!",
                exit: "EXIT",
                restart: "🔄 RESTART",
                get_signal: "GET SIGNAL",
                wait: "WAIT",
                analyzing: "ANALYZING...",
                bottom_note: "HACK SYSTEM WILL NOT GIVE SIGNALS IF YOU ARE NOT REGISTERED VIA PROMO CODE, NO DEPOSIT, NOT SUBSCRIBED TO CHANNELS, OR NO 3 REFERRALS!"
            }
        };

        const t = translations[lang];
        document.getElementById('loader-text').innerText = t.injecting;
        document.getElementById('warning-text').innerText = t.warning;
        document.getElementById('exit-btn').innerText = t.exit;
        document.getElementById('restart-btn').innerText = t.restart;
        document.getElementById('hack-btn').innerText = t.get_signal;
        document.getElementById('wait-label').innerText = t.wait;
        document.getElementById('bottom-info').innerText = t.bottom_note;

        const games = [
            { id: 'apple', name: 'Apple Of Fortune', c: 5, r: 10, icon: '🍎', kfs: [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.99, 69.93, 349.68] },
            { id: 'kamikaze', name: 'Kamikaze', c: 5, r: 12, icon: '🛩', kfs: [1.2, 1.5, 2, 3, 5, 10, 20, 50, 100, 250, 500, 1000] },
            { id: 'dragon', name: 'Dragon\'s Gold', c: 5, r: 10, icon: '🪙', kfs: [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.99, 69.93, 349.68] },
            { id: 'eastern', name: 'Eastern Nights', c: 5, r: 10, icon: '🪔', kfs: [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.99, 69.93, 349.68] },
            { id: 'wild', name: 'Wild West Gold', c: 3, r: 10, icon: '💰', kfs: [3, 9, 27, 81, 243, 729, 2187, 6561, 19683, 59049] },
            { id: 'swamp', name: 'Swamp Land', c: 5, r: 4, icon: '🐸', kfs: [1.3, 2.17, 5.43, 27.16] }
        ];

        let state = { current: 0, activeGame: null };
        const list = document.getElementById('game-list');
        games.forEach(g => {
            list.innerHTML += `<div class="hacker-card p-4 flex items-center justify-between" onclick="initGame('${g.id}')">
                <div class="flex flex-col"><span class="text-xs font-bold uppercase">${g.name}</span><span class="text-[8px] opacity-60">TARGET: DATABASE_X</span></div>
                <span class="text-2xl">${g.icon}</span></div>`;
        });

        function initGame(gid) {
            state.activeGame = games.find(x => x.id === gid); state.current = 0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('game-name').innerText = state.activeGame.name;
            renderGrid();
        }

        function renderGrid() {
            const wrapper = document.getElementById('grid-wrapper'); wrapper.innerHTML = '';
            for (let i = 0; i < state.activeGame.r; i++) {
                const row = document.createElement('div');
                row.className = 'row-container'; row.id = `r-${i}`;
                let cells = '';
                for (let j = 0; j < state.activeGame.c; j++) cells += `<div class="cell" id="c-${i}-${j}">0x${Math.floor(Math.random()*16).toString(16).toUpperCase()}</div>`;
                row.innerHTML = cells + `<div class="kf-badge">x${state.activeGame.kfs[i]}</div>`;
                wrapper.appendChild(row);
            }
        }

        function resetGameProgression() { state.current = 0; renderGrid(); }

        function stepHack() {
            if (state.current >= state.activeGame.r) { resetGameProgression(); return; }
            const btn = document.getElementById('hack-btn'); const cd = document.getElementById('cooldown');
            btn.disabled = true; btn.innerText = t.analyzing;
            tg.HapticFeedback.impactOccurred('heavy');
            setTimeout(() => {
                const rowIdx = state.current;
                const randCol = Math.floor(Math.random() * state.activeGame.c);
                const rowEl = document.getElementById(`r-${rowIdx}`);
                const cellEl = document.getElementById(`c-${rowIdx}-${randCol}`);
                rowEl.classList.add('active-row');
                cellEl.classList.add('hack-active');
                cellEl.innerHTML = state.activeGame.icon;
                rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                tg.HapticFeedback.notificationOccurred('success');
                state.current++;
                btn.style.display = 'none'; cd.style.display = 'block';
                let s = 2; document.getElementById('sec').innerText = s;
                const timer = setInterval(() => {
                    s--; document.getElementById('sec').innerText = s;
                    if(s <= 0) {
                        clearInterval(timer); btn.style.display = 'block'; btn.disabled = false;
                        btn.innerText = (state.current >= state.activeGame.r) ? t.restart : t.get_signal;
                        cd.style.display = 'none';
                    }
                }, 1000);
            }, 800);
        }

        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array.from({length: 40}).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "12px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*12, y*12);
                if(y*12 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 40);

        let p = 0; 
        const itv = setInterval(() => {
            p += 1.2; document.getElementById('bar').style.width = p + "%";
            if(p >= 100){ 
                clearInterval(itv); 
                document.getElementById('loader').style.display = 'none'; 
                document.getElementById('menu').style.display = 'flex'; 
            }
        }, 60);
    </script>
</body>
</html>
