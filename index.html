<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RICHI28 HACKER HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #00ff41; --bg: #050505; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'JetBrains Mono', monospace; overflow: hidden; user-select: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        
        .hacker-card { 
            background: rgba(0, 255, 65, 0.05); 
            border: 1px solid var(--neon); 
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            transition: 0.3s;
        }
        .hacker-card:active { background: var(--neon); color: black; }

        /* Scroll & Grid Animation */
        #grid-wrapper { 
            max-height: 65vh; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column-reverse; 
            padding: 20px 0;
            scrollbar-width: none;
        }
        #grid-wrapper::-webkit-scrollbar { display: none; }
        
        .row-container { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px; 
            margin-bottom: 12px; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0.4;
        }
        .row-container.active-row { opacity: 1; transform: scale(1.02); }
        
        .cell { 
            width: 55px; 
            height: 55px; 
            border: 1px solid rgba(0, 255, 65, 0.3); 
            background: rgba(0, 20, 0, 0.7); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px;
            position: relative;
        }
        .cell.hack-active { 
            background: var(--neon); 
            color: black; 
            box-shadow: 0 0 25px var(--neon); 
            font-weight: bold;
            border: none;
            animation: pulse 0.4s infinite;
        }
        
        .kf-badge { 
            font-size: 11px; 
            color: #fff; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 4px 8px; 
            border-radius: 4px; 
            min-width: 50px; 
            text-align: center; 
            border: 1px solid var(--neon);
            box-shadow: 0 0 5px var(--neon);
        }

        .hask-img { filter: drop-shadow(0 0 5px var(--neon)) brightness(1.2); width: 45px; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body class="flex flex-col items-center">

    <canvas id="matrix"></canvas>

    <div id="loader" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-6">
        <h1 class="text-3xl font-bold mb-8 tracking-[10px] text-[#00ff41]">RICHI28</h1>
        <div class="w-full max-w-xs h-1 bg-gray-900 border border-[#00ff41] overflow-hidden">
            <div id="bar" class="h-full bg-[#00ff41] w-0 transition-all duration-75"></div>
        </div>
        <p class="mt-4 text-[10px] animate-pulse">> BYPASSING SECURITY...</p>
    </div>

    <div id="menu" class="hidden w-full p-5 flex flex-col items-center z-10 overflow-y-auto h-screen">
        <div class="w-full p-3 border border-[#00ff41] bg-black/80 mb-6 text-[10px] leading-relaxed shadow-[0_0_15px_rgba(0,255,65,0.1)]">
            > AUTH_STATUS: <span class="text-white">ENCRYPTED</span><br>
            > EXPLOIT_V4: <span class="text-white">READY</span>
        </div>

        <div class="grid grid-cols-1 gap-4 w-full">
            <div class="hacker-card p-4 flex items-center justify-between" onclick="initGame('APPLE OF FORTUNE', 5, 10, [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.99, 69.93, 349.68], 'https://cdn-icons-png.flaticon.com/512/415/415733.png')">
                <div class="flex flex-col">
                    <span class="text-xs font-bold">APPLE OF FORTUNE</span>
                    <span class="text-[8px] opacity-60">TARGET: FRUIT_SERVER</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/415/415733.png" class="hask-img w-8">
            </div>
            <div class="hacker-card p-4 flex items-center justify-between" onclick="initGame('KAMIKAZE', 5, 12, [1.2, 1.5, 2, 3, 5, 10, 20, 50, 100, 250, 500, 1000], 'https://cdn-icons-png.flaticon.com/512/579/579268.png')">
                <div class="flex flex-col">
                    <span class="text-xs font-bold">KAMIKAZE</span>
                    <span class="text-[8px] opacity-60">TARGET: PLANE_ENGINE</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/579/579268.png" class="hask-img w-8">
            </div>
            <div class="hacker-card p-4 flex items-center justify-between" onclick="initGame('DRAGON GOLD', 5, 10, [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.99, 69.93, 349.68], 'https://cdn-icons-png.flaticon.com/512/3063/3063822.png')">
                <div class="flex flex-col">
                    <span class="text-xs font-bold">DRAGON'S GOLD</span>
                    <span class="text-[8px] opacity-60">TARGET: GOLD_VAULT</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="hask-img w-8">
            </div>
        </div>
    </div>

    <div id="game-ui" class="hidden w-full p-4 flex flex-col items-center z-10">
        <div class="w-full flex justify-between items-center mb-4">
            <span onclick="location.reload()" class="text-[10px] underline cursor-pointer text-[#00f3ff]">< TERMINATE</span>
            <span id="game-name" class="text-xs font-bold text-white tracking-widest"></span>
        </div>

        <div id="grid-wrapper" class="w-full">
            </div>

        <button id="hack-btn" class="mt-6 w-full py-5 bg-black border-2 border-[#00ff41] font-bold tracking-[5px] active:bg-[#00ff41] active:text-black shadow-[0_0_20px_rgba(0,255,65,0.2)]" onclick="stepHack()">
            GET SIGNAL
        </button>
        
        <div id="cooldown" class="mt-4 text-[10px] text-red-500 hidden italic animate-pulse">
            OVERHEAT_PROTECTION: <span id="sec">15</span>s
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array.from({length: 40}).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "12px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*12, y*12);
                if(y*12 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 40);

        // Loader
        let p = 0;
        const itv = setInterval(() => {
            p += 2.5; document.getElementById('bar').style.width = p+"%";
            if(p>=100){ clearInterval(itv); document.getElementById('loader').style.display='none'; document.getElementById('menu').style.display='flex'; }
        }, 40);

        // Game Logic
        let state = { c: 0, r: 0, kfs: [], current: 0 };

        function initGame(name, c, r, kfs, img) {
            state = { c, r, kfs, current: 0 };
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('game-name').innerText = name;
            
            const wrapper = document.getElementById('grid-wrapper');
            wrapper.innerHTML = '';

            for (let i = 0; i < r; i++) {
                const row = document.createElement('div');
                row.className = 'row-container';
                row.id = `r-${i}`;
                
                let cells = '';
                for (let j = 0; j < c; j++) {
                    cells += `<div class="cell" id="c-${i}-${j}">0x${Math.floor(Math.random()*16).toString(16).toUpperCase()}</div>`;
                }
                
                row.innerHTML = cells + `<div class="kf-badge">x${kfs[i]}</div>`;
                wrapper.appendChild(row);
            }
        }

        function stepHack() {
            if (state.current >= state.r) return;

            const btn = document.getElementById('hack-btn');
            const cooldown = document.getElementById('cooldown');
            
            btn.disabled = true;
            btn.innerText = "INJECTING...";
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const rowIdx = state.current;
                const randCol = Math.floor(Math.random() * state.c);
                
                // Hozirgi qatorni aktiv qilish
                const rowEl = document.getElementById(`r-${rowIdx}`);
                const cellEl = document.getElementById(`c-${rowIdx}-${randCol}`);
                
                rowEl.classList.add('active-row');
                cellEl.classList.add('hack-active');
                cellEl.innerHTML = "SAFE";
                
                // Avtomatik scroll (pastdan tepaga)
                rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

                tg.HapticFeedback.notificationOccurred('success');
                state.current++;

                // Cooldown
                btn.style.display = 'none';
                cooldown.style.display = 'block';
                let s = 15;
                const timer = setInterval(() => {
                    s--; document.getElementById('sec').innerText = s;
                    if(s <= 0) {
                        clearInterval(timer);
                        btn.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = "GET SIGNAL";
                        cooldown.style.display = 'none';
                    }
                }, 1000);
            }, 1200);
        }
    </script>
</body>
</html>
